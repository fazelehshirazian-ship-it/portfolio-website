<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Fazelehsadat Shirazian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
    <style>
        .admin-hidden { display: none; }
        .admin-show { display: block; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white">
    <div id="app"></div>

    <script>
        // Data Management
        const defaultData = {
            name: 'Fazelehsadat Shirazian',
            title: 'Master Student in Biomedical Engineering | TU Darmstadt',
            email: 'fazelehshirazian@gmail.com',
            phone: '017631120465',
            location: 'Darmstadt, Germany',
            about: 'Master student in Biomedical Engineering at TU Darmstadt with practical experience in microfluidic systems, laboratory work, and interdisciplinary research projects.',
            profileImage: null,
            experiences: [
                {
                    id: 1,
                    title: 'Scientific Research Assistant',
                    company: 'TU Darmstadt - Integrated Micro-Nano-Systems',
                    period: 'Oct 2024 - Present',
                    description: 'Design and development of microfluidic systems'
                },
                {
                    id: 2,
                    title: 'Tutor',
                    company: 'TU Darmstadt',
                    period: 'Oct 2024 - Present',
                    description: 'Support students in EKG and EMG investigations'
                }
            ],
            skills: ['SolidWorks', 'Python', 'MATLAB', 'Machine Learning', 'Medical Imaging']
        };

        let portfolioData = JSON.parse(localStorage.getItem('portfolioData')) || defaultData;
        let isLoggedIn = false;

        // Save to localStorage
        function saveData() {
            localStorage.setItem('portfolioData', JSON.stringify(portfolioData));
        }

        // Admin Login
        function handleLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                isLoggedIn = true;
                renderApp();
            } else {
                alert('رمز غلط است!');
            }
        }

        // Render App
        function renderApp() {
            const app = document.getElementById('app');
            
            if (isLoggedIn) {
                app.innerHTML = `
                    <div class="min-h-screen bg-slate-900">
                        <div class="bg-slate-800 border-b border-slate-700 p-6 flex justify-between items-center">
                            <h1 class="text-2xl font-bold text-blue-400">📊 Admin Panel</h1>
                            <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded">
                                خروج
                            </button>
                        </div>

                        <div class="max-w-4xl mx-auto p-6">
                            <div class="bg-slate-800 rounded-lg p-6 mb-6">
                                <h2 class="text-2xl font-bold mb-4">👤 اطلاعات شخصی</h2>
                                <div class="space-y-4">
                                    <input 
                                        type="text" 
                                        id="nameInput"
                                        value="${portfolioData.name}"
                                        placeholder="نام"
                                        class="w-full bg-slate-700 text-white p-3 rounded border border-slate-600"
                                        onchange="portfolioData.name = this.value; saveData();"
                                    />
                                    <input 
                                        type="text" 
                                        id="titleInput"
                                        value="${portfolioData.title}"
                                        placeholder="عنوان"
                                        class="w-full bg-slate-700 text-white p-3 rounded border border-slate-600"
                                        onchange="portfolioData.title = this.value; saveData();"
                                    />
                                    <textarea 
                                        id="aboutInput"
                                        placeholder="درباره"
                                        class="w-full bg-slate-700 text-white p-3 rounded border border-slate-600 h-24"
                                        onchange="portfolioData.about = this.value; saveData();"
                                    >${portfolioData.about}</textarea>
                                    <input 
                                        type="email" 
                                        id="emailInput"
                                        value="${portfolioData.email}"
                                        placeholder="ایمیل"
                                        class="w-full bg-slate-700 text-white p-3 rounded border border-slate-600"
                                        onchange="portfolioData.email = this.value; saveData();"
                                    />
                                </div>
                            </div>

                            <div class="text-center text-slate-400">
                                💾 تمام تغییرات خودکار ذخیره می‌شوند!
                            </div>
                        </div>
                    </div>
                `;
            } else {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <div class="max-w-4xl w-full">
                            <!-- Public View -->
                            <nav class="fixed top-0 w-full bg-slate-900/95 border-b border-slate-700 z-50">
                                <div class="max-w-4xl mx-auto px-4 h-16 flex justify-between items-center">
                                    <div class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                                        Portfolio
                                    </div>
                                    <button onclick="showLoginPanel()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">
                                        🔐 Admin
                                    </button>
                                </div>
                            </nav>

                            <!-- Hero Section -->
                            <section class="pt-32 pb-20 px-4 text-center">
                                <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                                    ${portfolioData.name}
                                </h1>
                                <p class="text-xl text-slate-300 mb-8">${portfolioData.title}</p>
                                <p class="text-lg text-slate-400 mb-12 max-w-2xl mx-auto">${portfolioData.about}</p>
                                <div class="flex justify-center gap-4">
                                    <a href="mailto:${portfolioData.email}" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded">
                                        📧 ایمیل
                                    </a>
                                </div>
                            </section>

                            <!-- Experiences -->
                            <section class="py-20 px-4 bg-slate-800/30">
                                <div class="max-w-4xl mx-auto">
                                    <h2 class="text-4xl font-bold mb-12 text-center">💼 تجربیات</h2>
                                    <div class="space-y-8">
                                        ${portfolioData.experiences.map(exp => `
                                            <div class="border-l-4 border-blue-400 pl-6">
                                                <h3 class="text-2xl font-bold mb-1">${exp.title}</h3>
                                                <p class="text-blue-400 mb-2">${exp.company}</p>
                                                <p class="text-slate-400 text-sm mb-3">${exp.period}</p>
                                                <p class="text-slate-300">${exp.description}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </section>

                            <!-- Skills -->
                            <section class="py-20 px-4">
                                <div class="max-w-4xl mx-auto">
                                    <h2 class="text-4xl font-bold mb-12 text-center">⚡ مهارت‌ها</h2>
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        ${portfolioData.skills.map(skill => `
                                            <div class="bg-slate-700/50 p-4 rounded text-center">
                                                ${skill}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </section>

                            <!-- Login Panel (Hidden) -->
                            <div id="loginPanel" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                                <div class="bg-slate-800 p-8 rounded-lg max-w-md w-full">
                                    <h2 class="text-2xl font-bold mb-4">🔐 ورود ادمین</h2>
                                    <input 
                                        type="password" 
                                        id="adminPassword"
                                        placeholder="رمز"
                                        class="w-full bg-slate-700 text-white p-3 rounded mb-4 border border-slate-600"
                                    />
                                    <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded mb-2">
                                        ورود
                                    </button>
                                    <button onclick="hideLoginPanel()" class="w-full bg-slate-700 hover:bg-slate-600 text-white p-3 rounded">
                                        بستن
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function showLoginPanel() {
            document.getElementById('loginPanel').classList.remove('hidden');
        }

        function hideLoginPanel() {
            document.getElementById('loginPanel').classList.add('hidden');
        }

        function handleLogout() {
            isLoggedIn = false;
            renderApp();
        }

        // Initial render
        renderApp();
    </script>
</body>
</html>
